<table tuiTable class="table table-striped table-hover" [style.width.%]="100" [columns]="columns">
  <thead>
    <tr tuiThGroup>
      <th tuiTh>ФИО</th>
      <th tuiTh>Номер</th>
      <th tuiTh>Должность</th>
      <th tuiTh>Роль</th>
    </tr>
  </thead>
  <tbody tuiTbody [data]="data()">
    @for (item of data(); track item.id) {
      <tr tuiTr></tr>
    }
  </tbody>
</table>
